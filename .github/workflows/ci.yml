name: CI
on:
  push:
    branches: [ main, master, '**' ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: windows-2022
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 激活 MSVC 环境（这个保留，为了 nmake 和 cl.exe）
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: List available architectures for Qt 6.6.2 on Windows
        run: aqt list-qt windows desktop --arch 6.6.2

      - name: List modules for Qt 6.6.2 win64_msvc2022_64
        run: aqt list-qt windows desktop --modules 6.6.2 win64_msvc2022_64
      
      # 2. 关键：安装 Qt 6.6.0（你可以改成你喜欢的版本，如 6.6.3）
      - name: Install Qt using aqt directly
        run: |
          python -m pip install aqtinstall
          aqt install-qt windows desktop 6.6.2 win64_msvc2022_64 `
            --outputdir D:/a/PKU-Planner-Vibe-Version/Qt `
            --modules qtcharts

      # 3. 运行你的编译脚本
      - name: Build and run unit tests
        run: |
          .\run_build.bat
        shell: cmd

      - name: Smoke test
        # 记得在 smoke_test.bat 里加上 set QT_QPA_PLATFORM=offscreen
        run: |
          .\smoke_test.bat
        shell: cmd

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: PKUPlanner-exe
          path: build\PKUPlanner.exe