name: CI
on:
  push:
    branches: [ main, master, '**' ]
  pull_request:
    branches: [ main, master ]

# 解决 Node.js 24 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    # 明确指定版本以避免迁移期的重定向警告
    runs-on: windows-2022 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- 新增这一步：激活 MSVC 环境 ---
      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Environment Path (Dynamic)
        run: |
          # 动态寻找 C:\Qt 下第一个以 6. 开头的文件夹中的 msvc 目录
          $qtPath = Get-ChildItem -Path "C:\Qt\6.*" | Select-Object -First 1
          $msvcPath = Join-Path $qtPath.FullName "msvc2022_64"
          echo "Found Qt at: $msvcPath"
          echo "$msvcPath\bin" >> $env:GITHUB_PATH
          echo "CMAKE_PREFIX_PATH=$msvcPath" >> $env:GITHUB_ENV
        shell: powershell

      - name: Build and run unit tests
        env:
          QT_DIR: C:\Qt\6.6\msvc2022_64
          CMAKE_PREFIX_PATH: C:\Qt\6.6\msvc2022_64
        run: |
          .\run_build.bat
        shell: cmd

      - name: Smoke test
        run: |
          .\smoke_test.bat
        shell: cmd

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: PKUPlanner-exe
          path: build\PKUPlanner.exe